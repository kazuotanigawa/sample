<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TODOアプリ</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 480px;
    margin: 40px auto;
    padding: 0 16px;
    background: #f5f5f5;
    color: #333;
  }
  h1 {
    text-align: center;
    color: #444;
  }
  .input-area {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  #task-input {
    flex: 1;
    padding: 10px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 4px;
    min-width: 0;
  }
  #date-input {
    padding: 10px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  #add-btn {
    padding: 10px 16px;
    font-size: 16px;
    background: #4a90e2;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  #add-btn:hover {
    background: #3a7bc8;
  }
  ul {
    list-style: none;
    padding: 0;
  }
  li {
    display: flex;
    align-items: center;
    background: #fff;
    padding: 12px;
    margin-bottom: 8px;
    border-radius: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  li.done .text {
    text-decoration: line-through;
    color: #999;
  }
  .text {
    flex: 1;
    margin-left: 8px;
    word-break: break-all;
  }
  .due {
    font-size: 12px;
    color: #666;
    margin-right: 8px;
    white-space: nowrap;
  }
  .due.overdue {
    color: #e74c3c;
    font-weight: bold;
  }
  .due.today {
    color: #e67e22;
    font-weight: bold;
  }
  .delete-btn {
    background: #e74c3c;
    color: #fff;
    border: none;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
  }
  .delete-btn:hover {
    background: #c0392b;
  }
</style>
</head>
<body>
  <h1>TODOアプリ🔥</h1>
  <div class="input-area">
    <input type="text" id="task-input" placeholder="やることを入力...">
    <input type="date" id="date-input">
    <button id="add-btn">追加</button>
  </div>
  <ul id="task-list"></ul>

<script>
  const STORAGE_KEY = "todo-tasks";
  const input = document.getElementById("task-input");
  const dateInput = document.getElementById("date-input");
  const addBtn = document.getElementById("add-btn");
  const list = document.getElementById("task-list");

  let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function formatDue(dueDate) {
    const today = todayStr();
    const span = document.createElement("span");
    span.className = "due";
    span.textContent = dueDate;
    if (dueDate < today) span.classList.add("overdue");
    else if (dueDate === today) span.classList.add("today");
    return span;
  }

  function sortedTasks() {
    return tasks
      .map((t, i) => ({ task: t, index: i }))
      .sort((a, b) => {
        const da = a.task.due || "9999-99-99";
        const db = b.task.due || "9999-99-99";
        return da.localeCompare(db);
      });
  }

  function render() {
    list.innerHTML = "";
    sortedTasks().forEach(({ task, index }) => {
      const li = document.createElement("li");
      if (task.done) li.classList.add("done");

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = task.done;
      checkbox.addEventListener("change", () => {
        tasks[index].done = checkbox.checked;
        save();
        render();
      });

      const text = document.createElement("span");
      text.className = "text";
      text.textContent = task.text;

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-btn";
      deleteBtn.textContent = "削除";
      deleteBtn.addEventListener("click", () => {
        tasks.splice(index, 1);
        save();
        render();
      });

      li.appendChild(checkbox);
      li.appendChild(text);
      if (task.due) li.appendChild(formatDue(task.due));
      li.appendChild(deleteBtn);
      list.appendChild(li);
    });
  }

  function addTask() {
    const value = input.value.trim();
    if (!value) return;
    tasks.push({ text: value, done: false, due: dateInput.value || null });
    input.value = "";
    dateInput.value = "";
    save();
    render();
  }

  addBtn.addEventListener("click", addTask);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") addTask();
  });

  render();
</script>
</body>
</html>
